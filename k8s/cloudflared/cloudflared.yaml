# Cloudflare Tunnel connector (cloudflared) - one per cluster.
# Token-based / remotely-managed tunnel: public hostname -> service routing is
# configured in the Cloudflare Zero Trust dashboard, not here.
#
# The tunnel token is a SECRET and is NOT in this repo. Create it once:
#   kubectl -n cloudflared create secret generic cloudflared-token \
#     --from-literal=token='<YOUR_TUNNEL_TOKEN>'
#
# Apply:
#   kubectl apply -f k8s/cloudflared.yaml
apiVersion: v1
kind: Namespace
metadata:
    name: cloudflared
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: cloudflared
    namespace: cloudflared
spec:
    replicas: 2          # HA: two connectors across nodes
    selector:
        matchLabels:
            app: cloudflared
    template:
        metadata:
            labels:
                app: cloudflared
        spec:
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: cloudflared
                  image: cloudflare/cloudflared:2026.5.2
                  args:
                      - tunnel
                      - --no-autoupdate
                      - --metrics
                      - 0.0.0.0:2000
                      - run
                  env:
                      - name: TUNNEL_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: cloudflared-token
                                key: token
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                          drop:
                              - ALL
                  resources:
                      requests:
                          cpu: 50m
                          memory: 64Mi
                      limits:
                          cpu: 200m
                          memory: 128Mi
                  livenessProbe:
                      httpGet:
                          path: /ready
                          port: 2000
                      initialDelaySeconds: 10
                      periodSeconds: 10
