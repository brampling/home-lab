# ArgoCD Application: manages the Cloudflare Tunnel connector from git.
# The tunnel token secret (cloudflared-token) is NOT in git and is created
# imperatively once - ArgoCD does not manage or prune it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: cloudflared
    namespace: argocd
spec:
    project: default
    source:
        repoURL: https://github.com/brampling/home-lab.git
        targetRevision: main
        path: k8s/cloudflared
    destination:
        server: https://kubernetes.default.svc
        namespace: cloudflared
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
