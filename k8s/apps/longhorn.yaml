# ArgoCD Application: Longhorn distributed block storage (Helm chart).
# Requires the iscsi-tools + util-linux-tools Talos extensions on every node.
# Data is stored on the longhorn user volume mounted at /var/mnt/longhorn.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: longhorn
    namespace: argocd
spec:
    project: default
    source:
        repoURL: https://charts.longhorn.io
        chart: longhorn
        targetRevision: 1.12.0
        helm:
            valuesObject:
                defaultSettings:
                    # Store replica data on the dedicated SSD user volume.
                    defaultDataPath: /var/mnt/longhorn
                # The pre-upgrade hook job runs as an ArgoCD PreSync hook before
                # its ServiceAccount exists and gets stuck. Not needed here.
                preUpgradeChecker:
                    jobEnabled: false
    destination:
        server: https://kubernetes.default.svc
        namespace: longhorn-system
    syncPolicy:
        automated:
            prune: false
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true   # Longhorn CRDs are large
        # Longhorn needs privileged pods; label the namespace accordingly.
        managedNamespaceMetadata:
            labels:
                pod-security.kubernetes.io/enforce: privileged
                pod-security.kubernetes.io/audit: privileged
                pod-security.kubernetes.io/warn: privileged
